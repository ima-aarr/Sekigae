<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>席替えプロ - 高機能カスタマイズ版</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #3498db;
            --priority-zone: #ffeaa7; /* 優先エリアの色 */
            --marker-color: #ff7675;   /* *マークの人の色 */
            --text-main: #2d3436;
        }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 14px; }
        input, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        textarea { height: 120px; resize: vertical; }
        
        .mode-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .mode-btn { padding: 10px 20px; border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .mode-btn.active { background: var(--primary); color: white; }

        .instruction { text-align: center; padding: 10px; background: #e1f5fe; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        
        .classroom { display: flex; flex-direction: column; align-items: center; }
        .teacher-desk { width: 180px; padding: 12px; background: #95a5a6; color: white; border-radius: 4px; text-align: center; margin-bottom: 30px; font-weight: bold; letter-spacing: 5px; }
        
        #desk-container { display: grid; gap: 12px; }
        .desk { 
            width: 75px; height: 75px; background: #fff; border: 2px solid #ddd; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; padding: 4px; overflow: hidden;
        }
        /* 各種座席の状態 */
        .desk.removed { background: #eee; border-style: dashed; color: transparent; border-color: #ccc; }
        .desk.priority { background-color: var(--priority-zone); border-color: #f1c40f; }
        .desk.marked { background-color: var(--marker-color) !important; color: white; border-color: #d63031; }
        .desk.selected { outline: 3px solid #0984e3; transform: scale(1.05); z-index: 10; }
        .desk.empty { color: #b2bec3; font-weight: normal; font-size: 11px; }

        .action-area { text-align: center; margin-top: 30px; }
        .btn-main { padding: 15px 40px; font-size: 20px; background: #2ecc71; color: white; border: none; border-radius: 40px; cursor: pointer; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-main:hover { background: #27ae60; transform: translateY(-2px); }

        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>席替えプロ</h1>

    <div class="settings-grid">
        <div class="input-group">
            <label>1. 配置サイズ</label>
            <div>
                縦: <input type="number" id="rows" value="6" min="1" style="width:50px"> 
                横: <input type="number" id="cols" value="6" min="1" style="width:50px">
                <button onclick="initGrid()" style="padding:5px">再生成</button>
            </div>
        </div>
        <div class="input-group">
            <label>2. 生徒名簿（改行区切り）</label>
            <textarea id="nameList" placeholder="名前1&#10;*色付けしたい人&#10;@優先エリアに座らせたい人"></textarea>
            <span style="font-size:11px; color:#636e72;">*：赤色表示、 @：優先エリアへ</span>
        </div>
    </div>

    <div class="mode-switcher">
        <button class="mode-btn active" id="mode-remove" onclick="setMode('remove')">席の削除/追加</button>
        <button class="mode-btn" id="mode-priority" onclick="setMode('priority')">優先エリア設定</button>
        <button class="mode-btn" id="mode-swap" onclick="setMode('swap')">個別入れ替え</button>
    </div>

    <div class="instruction" id="info-text">席をクリックして、通路など「使わない席」を消してください。</div>

    <div class="classroom">
        <div class="teacher-desk">教卓</div>
        <div id="desk-container"></div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background: #fff"></div> 通常席</div>
        <div class="legend-item"><div class="box" style="background: var(--priority-zone)"></div> 優先エリア</div>
        <div class="legend-item"><div class="box" style="background: var(--marker-color)"></div> マークされた人</div>
        <div class="legend-item"><div class="box" style="border: 2px dashed #ccc"></div> 通路/壁</div>
    </div>

    <div class="action-area">
        <button class="btn-main" onclick="shuffle()">席替え実行！</button>
    </div>
</div>

<script>
    let currentMode = 'remove';
    let selectedDesk = null;

    // 初期データ例
    document.getElementById('nameList').value = "佐藤\n鈴木\n*高橋(色付き)\n@田中(優先)\n伊藤\n渡辺\n@山本(優先)\n中村\n小林\n加藤";

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + mode).classList.add('active');
        
        const info = document.getElementById('info-text');
        if(mode === 'remove') info.innerText = "席をクリックして、使わない席を「点線」にしてください。";
        if(mode === 'priority') info.innerText = "クリックして黄色い「優先エリア」を作ります。@付きの人がここに入ります。";
        if(mode === 'swap') info.innerText = "2つの席を順番にクリックすると、中身を入れ替えます。";
    }

    function initGrid() {
        const rows = document.getElementById('rows').value;
        const cols = document.getElementById('cols').value;
        const container = document.getElementById('desk-container');
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        container.innerHTML = '';

        for (let i = 0; i < rows * cols; i++) {
            const div = document.createElement('div');
            div.className = 'desk';
            div.onclick = () => handleDeskClick(div);
            container.appendChild(div);
        }
    }

    function handleDeskClick(el) {
        if (currentMode === 'remove') {
            el.classList.toggle('removed');
            el.classList.remove('priority');
            el.innerText = '';
        } else if (currentMode === 'priority') {
            if (el.classList.contains('removed')) return;
            el.classList.toggle('priority');
        } else if (currentMode === 'swap') {
            if (!selectedDesk) {
                selectedDesk = el;
                el.classList.add('selected');
            } else {
                const tempHTML = el.innerHTML;
                const tempClass = el.className;
                
                // クラスの入れ替え（removed以外）
                const c1 = Array.from(selectedDesk.classList);
                const c2 = Array.from(el.classList);
                
                el.innerHTML = selectedDesk.innerHTML;
                selectedDesk.innerHTML = tempHTML;
                
                // デザイン状態の交換
                const states = ['priority', 'marked', 'empty'];
                states.forEach(s => {
                    const has1 = selectedDesk.classList.contains(s);
                    const has2 = el.classList.contains(s);
                    has2 ? selectedDesk.classList.add(s) : selectedDesk.classList.remove(s);
                    has1 ? el.classList.add(s) : el.classList.remove(s);
                });

                selectedDesk.classList.remove('selected');
                selectedDesk = null;
            }
        }
    }

    function shuffle() {
        const names = document.getElementById('nameList').value.split('\n').filter(n => n.trim() !== "");
        const allDesks = Array.from(document.querySelectorAll('.desk:not(.removed)'));
        
        if (names.length > allDesks.length) {
            alert(`席が足りません！\n生徒数: ${names.length}\n有効な席数: ${allDesks.length}`);
            return;
        }

        // 属性の解析
        const priorityPeople = names.filter(n => n.startsWith('@'));
        const normalPeople = names.filter(n => !n.startsWith('@'));
        
        const priorityDesks = allDesks.filter(d => d.classList.contains('priority'));
        const normalDesks = allDesks.filter(d => !d.classList.contains('priority'));

        if (priorityPeople.length > priorityDesks.length) {
            alert(`優先エリアの席が足りません！\n@付きの人: ${priorityPeople.length}\n優先席数: ${priorityDesks.length}`);
            return;
        }

        // シャッフル用関数
        const fShuffle = (arr) => arr.sort(() => Math.random() - 0.5);

        // 1. 優先エリアの配置
        fShuffle(priorityPeople);
        fShuffle(priorityDesks);
        
        // 優先席に@の人を入れ、余った優先席は通常席として扱う
        const remainingNormalPeople = [...normalPeople];
        const combinedNormalDesks = [...normalDesks];

        allDesks.forEach(d => { d.innerText = ''; d.classList.remove('marked', 'empty'); });

        priorityPeople.forEach((person, i) => {
            fillDesk(priorityDesks[i], person);
        });

        // 残った優先席を通常席リストへ
        for(let i = priorityPeople.length; i < priorityDesks.length; i++) {
            combinedNormalDesks.push(priorityDesks[i]);
        }

        // 2. 残りの席の配置
        fShuffle(remainingNormalPeople);
        fShuffle(combinedNormalDesks);

        combinedNormalDesks.forEach((desk, i) => {
            if (remainingNormalPeople[i]) {
                fillDesk(desk, remainingNormalPeople[i]);
            } else {
                desk.innerText = '空席';
                desk.classList.add('empty');
            }
        });

        setMode('swap'); // 席替え後は微調整モードへ
    }

    function fillDesk(el, name) {
        let cleanName = name;
        if (name.startsWith('@')) cleanName = name.substring(1);
        
        if (cleanName.startsWith('*')) {
            cleanName = cleanName.substring(1);
            el.classList.add('marked');
        }
        el.innerText = cleanName;
    }

    window.onload = initGrid;
</script>

</body>
</html>
